<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5576c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa726;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#f8f9fa" rx="20"/>

  <!-- Stars -->
  <circle cx="40" cy="40" r="2" fill="#ffd700"/>
  <circle cx="160" cy="30" r="2.5" fill="#ffd700"/>
  <circle cx="50" cy="140" r="1.5" fill="#ffd700"/>
  <circle cx="155" cy="130" r="2" fill="#ffd700"/>

  <!-- Rocket flames -->
  <g>
    <ellipse cx="100" cy="155" rx="20" ry="28" fill="url(#flameGradient)" opacity="0.7">
      <animate attributeName="ry" values="28;32;28" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.5;0.7" dur="0.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="152" rx="12" ry="20" fill="#ffeb3b" opacity="0.9">
      <animate attributeName="ry" values="20;23;20" dur="0.4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Rocket body -->
  <g id="rocket">
    <!-- Main body -->
    <ellipse cx="100" cy="100" rx="28" ry="45" fill="url(#rocketGradient)"/>

    <!-- Nose cone -->
    <path d="M 100,45 Q 118,70 100,80 Q 82,70 100,45 Z" fill="#764ba2"/>

    <!-- Window -->
    <circle cx="100" cy="90" r="14" fill="url(#windowGradient)" opacity="0.9"/>
    <circle cx="100" cy="90" r="11" fill="#e3f2fd"/>

    <!-- Face -->
    <circle cx="95" cy="87" r="2" fill="#333"/>
    <circle cx="105" cy="87" r="2" fill="#333"/>
    <path d="M 95,93 Q 100,97 105,93" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Rivets -->
    <circle cx="86" cy="110" r="2" fill="#5a67d8" opacity="0.5"/>
    <circle cx="114" cy="110" r="2" fill="#5a67d8" opacity="0.5"/>

    <!-- Fins -->
    <path d="M 72,118 L 60,138 L 72,134 Z" fill="#667eea" opacity="0.8"/>
    <path d="M 128,118 L 140,138 L 128,134 Z" fill="#667eea" opacity="0.8"/>
    <path d="M 82,140 L 72,158 L 86,145 Z" fill="#5a67d8"/>
    <path d="M 118,140 L 128,158 L 114,145 Z" fill="#5a67d8"/>

    <!-- Git symbol -->
    <g transform="translate(100, 115)" opacity="0.7">
      <circle cx="0" cy="-5" r="2" fill="#fff"/>
      <circle cx="-4" cy="3" r="2" fill="#fff"/>
      <circle cx="4" cy="3" r="2" fill="#fff"/>
      <path d="M 0,-3 L 0,0 M -3,1.5 L 0,0 L 3,1.5" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Upward arrow -->
  <g opacity="0.6">
    <path d="M 100,20 L 100,35" stroke="#4caf50" stroke-width="3" stroke-linecap="round"/>
    <path d="M 100,20 L 94,26 M 100,20 L 106,26" stroke="#4caf50" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
</svg>
