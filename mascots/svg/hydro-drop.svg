<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- Hydro the Hydration Drop -->

  <!-- Ripple effects (transformation waves) -->
  <ellipse cx="100" cy="220" rx="60" ry="8" fill="#4A90E2" opacity="0.2"/>
  <ellipse cx="100" cy="225" rx="45" ry="6" fill="#5BA3F5" opacity="0.3"/>
  <ellipse cx="100" cy="228" rx="30" ry="4" fill="#4A90E2" opacity="0.4"/>

  <!-- Main water drop body -->
  <path d="M 100 30 Q 140 80 140 130 Q 140 180 100 200 Q 60 180 60 130 Q 60 80 100 30 Z"
        fill="url(#dropGradient)"/>

  <!-- Gradient definition for water drop -->
  <defs>
    <linearGradient id="dropGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3F5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4A90E2;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3B7BC4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="orangeCore" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFB84D;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF8C42;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:0.3" />
    </radialGradient>
  </defs>

  <!-- Orange core/heart (representing DRY source) -->
  <circle cx="100" cy="115" r="25" fill="url(#orangeCore)"/>

  <!-- Shine/highlight on drop -->
  <ellipse cx="85" cy="70" rx="15" ry="20" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="80" cy="65" r="8" fill="#FFFFFF" opacity="0.8"/>

  <!-- Friendly face -->
  <!-- Eyes -->
  <circle cx="90" cy="110" r="4" fill="#2C3E50"/>
  <circle cx="110" cy="110" r="4" fill="#2C3E50"/>
  <!-- Eye shine -->
  <circle cx="91" cy="109" r="1.5" fill="#FFFFFF"/>
  <circle cx="111" cy="109" r="1.5" fill="#FFFFFF"/>

  <!-- Happy smile -->
  <path d="M 85 125 Q 100 132 115 125" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Small streams/branches flowing from the drop -->
  <path d="M 130 150 Q 145 155 150 165" stroke="#5BA3F5" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 135 160 Q 148 168 152 178" stroke="#4A90E2" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <path d="M 70 150 Q 55 155 50 165" stroke="#5BA3F5" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 65 160 Q 52 168 48 178" stroke="#4A90E2" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Small droplets around (hydration process) -->
  <circle cx="145" cy="100" r="4" fill="#5BA3F5" opacity="0.6"/>
  <circle cx="155" cy="115" r="3" fill="#4A90E2" opacity="0.5"/>
  <circle cx="150" cy="130" r="3.5" fill="#5BA3F5" opacity="0.6"/>

  <circle cx="55" cy="100" r="4" fill="#5BA3F5" opacity="0.6"/>
  <circle cx="45" cy="115" r="3" fill="#4A90E2" opacity="0.5"/>
  <circle cx="50" cy="130" r="3.5" fill="#5BA3F5" opacity="0.6"/>

  <!-- Git branch symbol inside orange core -->
  <g transform="translate(100, 115)">
    <circle cx="0" cy="0" r="2" fill="#FFFFFF" opacity="0.9"/>
    <line x1="0" y1="2" x2="-3" y2="8" stroke="#FFFFFF" stroke-width="1.2" opacity="0.9"/>
    <line x1="0" y1="2" x2="3" y2="8" stroke="#FFFFFF" stroke-width="1.2" opacity="0.9"/>
    <circle cx="-3" cy="8" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="3" cy="8" r="1.5" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
