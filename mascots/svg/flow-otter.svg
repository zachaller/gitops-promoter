<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <!-- Flow the River Otter -->

  <!-- Water channels (promotion pipeline) -->
  <path d="M 10 180 Q 80 170 160 180 Q 240 190 310 180"
        stroke="#4A90E2" stroke-width="30" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 10 200 Q 80 190 160 200 Q 240 210 310 200"
        stroke="#5BA3F5" stroke-width="25" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Environment markers on channels -->
  <g transform="translate(40, 175)">
    <rect x="-15" y="-10" width="30" height="20" rx="5" fill="#4A90E2" opacity="0.6"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>
  </g>

  <g transform="translate(160, 185)">
    <rect x="-17" y="-10" width="34" height="20" rx="5" fill="#4A90E2" opacity="0.6"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>
  </g>

  <g transform="translate(280, 175)">
    <rect x="-18" y="-10" width="36" height="20" rx="5" fill="#4A90E2" opacity="0.6"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>
  </g>

  <!-- Water splashes -->
  <ellipse cx="190" cy="200" rx="20" ry="8" fill="#5BA3F5" opacity="0.5"/>
  <ellipse cx="200" cy="195" rx="15" ry="6" fill="#4A90E2" opacity="0.4"/>
  <ellipse cx="210" cy="198" rx="18" ry="7" fill="#5BA3F5" opacity="0.5"/>

  <!-- Splash droplets -->
  <circle cx="185" cy="185" r="3" fill="#5BA3F5" opacity="0.6"/>
  <circle cx="195" cy="180" r="2.5" fill="#4A90E2" opacity="0.5"/>
  <circle cx="205" cy="183" r="3.5" fill="#5BA3F5" opacity="0.6"/>
  <circle cx="215" cy="188" r="2" fill="#4A90E2" opacity="0.5"/>

  <!-- Otter tail (behind) -->
  <ellipse cx="90" cy="180" rx="35" ry="15" fill="#FF8C42" transform="rotate(-20 90 180)"/>
  <ellipse cx="85" cy="178" rx="30" ry="12" fill="#FFA15C" opacity="0.5" transform="rotate(-20 85 178)"/>

  <!-- Otter back legs -->
  <ellipse cx="130" cy="185" rx="12" ry="18" fill="#FF8C42" transform="rotate(10 130 185)"/>
  <ellipse cx="145" cy="188" rx="12" ry="18" fill="#FF8C42" transform="rotate(-10 145 188)"/>

  <!-- Otter body (sliding position) -->
  <ellipse cx="160" cy="160" rx="45" ry="35" fill="#FF8C42" transform="rotate(-15 160 160)"/>
  <ellipse cx="158" cy="158" rx="40" ry="30" fill="#FFA15C" opacity="0.4" transform="rotate(-15 158 158)"/>

  <!-- Otter belly (lighter) -->
  <ellipse cx="165" cy="165" rx="30" ry="22" fill="#FFE0C2" opacity="0.7" transform="rotate(-15 165 165)"/>

  <!-- Otter front paws -->
  <ellipse cx="185" cy="170" rx="10" ry="14" fill="#FF8C42" transform="rotate(20 185 170)"/>
  <ellipse cx="195" cy="175" rx="10" ry="13" fill="#FF8C42" transform="rotate(30 195 175)"/>

  <!-- Otter head -->
  <ellipse cx="195" cy="140" rx="28" ry="25" fill="#FF8C42"/>
  <ellipse cx="193" cy="138" rx="25" ry="22" fill="#FFA15C" opacity="0.4"/>

  <!-- Otter ears -->
  <ellipse cx="182" cy="125" rx="8" ry="10" fill="#FF8C42"/>
  <ellipse cx="208" cy="125" rx="8" ry="10" fill="#FF8C42"/>
  <ellipse cx="182" cy="126" rx="5" ry="6" fill="#FF6B35"/>
  <ellipse cx="208" cy="126" rx="5" ry="6" fill="#FF6B35"/>

  <!-- Otter muzzle/snout area -->
  <ellipse cx="205" cy="145" rx="15" ry="12" fill="#FFD4A3"/>

  <!-- Nose -->
  <ellipse cx="210" cy="143" rx="5" ry="4" fill="#2C3E50"/>

  <!-- Whiskers -->
  <line x1="205" y1="147" x2="230" y2="145" stroke="#2C3E50" stroke-width="1" opacity="0.6"/>
  <line x1="205" y1="150" x2="230" y2="152" stroke="#2C3E50" stroke-width="1" opacity="0.6"/>
  <line x1="205" y1="153" x2="228" y2="157" stroke="#2C3E50" stroke-width="1" opacity="0.6"/>

  <!-- Joyful eyes -->
  <ellipse cx="188" cy="137" rx="6" ry="8" fill="#2C3E50"/>
  <ellipse cx="202" cy="135" rx="6" ry="8" fill="#2C3E50"/>
  <circle cx="189" cy="136" r="2" fill="#FFFFFF"/>
  <circle cx="203" cy="134" r="2" fill="#FFFFFF"/>

  <!-- Happy smile -->
  <path d="M 200 148 Q 206 153 212 150" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Git branch/leaf in paw -->
  <g transform="translate(188, 173) rotate(20)">
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#4A90E2" opacity="0.7"/>
    <path d="M 0 -8 Q -3 -2 0 6 Q 3 -2 0 -8" stroke="#5BA3F5" stroke-width="1.5" fill="none"/>
    <line x1="0" y1="-8" x2="0" y2="6" stroke="#5BA3F5" stroke-width="1"/>
  </g>

  <!-- Motion lines (showing speed/flow) -->
  <line x1="120" y1="150" x2="140" y2="155" stroke="#4A90E2" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="115" y1="160" x2="135" y2="163" stroke="#5BA3F5" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="110" y1="170" x2="128" y2="172" stroke="#4A90E2" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>

  <!-- Flow arrow indicators -->
  <path d="M 250 195 L 265 195 L 260 190 M 265 195 L 260 200" stroke="#4A90E2" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
</svg>
