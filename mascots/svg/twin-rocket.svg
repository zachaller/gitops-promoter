<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 310" width="280" height="310">
  <!-- Twin Rocket - Dual Engine Parallel Deployment -->

  <!-- Left rocket exhaust -->
  <path d="M 75 285 Q 70 295 68 303" stroke="#4A90E2" stroke-width="7" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 85 288 Q 85 297 85 305" stroke="#FFA15C" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 95 285 Q 100 295 102 303" stroke="#4A90E2" stroke-width="7" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Right rocket exhaust -->
  <path d="M 185 285 Q 180 295 178 303" stroke="#4A90E2" stroke-width="7" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 195 288 Q 195 297 195 305" stroke="#FFA15C" stroke-width="8" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 205 285 Q 210 295 212 303" stroke="#4A90E2" stroke-width="7" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Connection struts between rockets -->
  <rect x="110" y="110" width="60" height="6" rx="2" fill="#4A90E2"/>
  <rect x="110" y="170" width="60" height="6" rx="2" fill="#4A90E2"/>
  <rect x="110" y="230" width="60" height="6" rx="2" fill="#4A90E2"/>

  <!-- Strut details -->
  <circle cx="120" cy="113" r="3" fill="#5BA3F5"/>
  <circle cx="160" cy="113" r="3" fill="#5BA3F5"/>
  <circle cx="120" cy="173" r="3" fill="#5BA3F5"/>
  <circle cx="160" cy="173" r="3" fill="#5BA3F5"/>
  <circle cx="120" cy="233" r="3" fill="#5BA3F5"/>
  <circle cx="160" cy="233" r="3" fill="#5BA3F5"/>

  <!-- LEFT ROCKET -->
  <!-- Body stages -->
  <rect x="60" y="220" width="60" height="65" rx="5" fill="#FF8C42"/>
  <rect x="65" y="225" width="50" height="55" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="90" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>

  <rect x="65" y="155" width="50" height="65" rx="5" fill="#FF8C42"/>
  <rect x="70" y="160" width="40" height="55" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="90" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>

  <rect x="70" y="100" width="40" height="55" rx="5" fill="#FF8C42"/>
  <rect x="75" y="105" width="30" height="45" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="90" y="131" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>

  <!-- Left nose cone -->
  <path d="M 90 35 L 110 100 L 70 100 Z" fill="#FF6B35"/>

  <!-- Left window -->
  <circle cx="90" cy="75" r="12" fill="#E8F4F8"/>
  <circle cx="87" cy="73" r="2.5" fill="#2C3E50"/>
  <circle cx="93" cy="73" r="2.5" fill="#2C3E50"/>
  <path d="M 86 79 Q 90 82 94 79" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Left fins -->
  <path d="M 60 230 L 40 265 L 42 280 L 60 255 Z" fill="#4A90E2"/>

  <!-- Left engine -->
  <rect x="70" y="285" width="18" height="8" rx="2" fill="#5A5A5A"/>
  <circle cx="79" cy="289" r="3" fill="#FFB84D" opacity="0.6"/>
  <rect x="92" y="285" width="18" height="8" rx="2" fill="#5A5A5A"/>
  <circle cx="101" cy="289" r="3" fill="#FFB84D" opacity="0.6"/>

  <!-- RIGHT ROCKET -->
  <!-- Body stages -->
  <rect x="160" y="220" width="60" height="65" rx="5" fill="#FF8C42"/>
  <rect x="165" y="225" width="50" height="55" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="190" y="258" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>

  <rect x="165" y="155" width="50" height="65" rx="5" fill="#FF8C42"/>
  <rect x="170" y="160" width="40" height="55" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="190" y="193" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>

  <rect x="170" y="100" width="40" height="55" rx="5" fill="#FF8C42"/>
  <rect x="175" y="105" width="30" height="45" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="190" y="131" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>

  <!-- Right nose cone -->
  <path d="M 190 35 L 210 100 L 170 100 Z" fill="#FF6B35"/>

  <!-- Right window -->
  <circle cx="190" cy="75" r="12" fill="#E8F4F8"/>
  <circle cx="187" cy="73" r="2.5" fill="#2C3E50"/>
  <circle cx="193" cy="73" r="2.5" fill="#2C3E50"/>
  <path d="M 186 79 Q 190 82 194 79" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Right fins -->
  <path d="M 220 230 L 240 265 L 238 280 L 220 255 Z" fill="#4A90E2"/>

  <!-- Right engine -->
  <rect x="170" y="285" width="18" height="8" rx="2" fill="#5A5A5A"/>
  <circle cx="179" cy="289" r="3" fill="#FFB84D" opacity="0.6"/>
  <rect x="192" y="285" width="18" height="8" rx="2" fill="#5A5A5A"/>
  <circle cx="201" cy="289" r="3" fill="#FFB84D" opacity="0.6"/>

  <!-- Sync indicators on struts -->
  <rect x="135" y="108" width="10" height="10" rx="2" fill="#00FF00" opacity="0.7"/>
  <text x="140" y="115" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">✓</text>

  <rect x="135" y="168" width="10" height="10" rx="2" fill="#00FF00" opacity="0.7"/>
  <text x="140" y="175" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">✓</text>

  <rect x="135" y="228" width="10" height="10" rx="2" fill="#00FF00" opacity="0.7"/>
  <text x="140" y="235" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">✓</text>

  <!-- "TWIN" badge -->
  <rect x="125" y="65" width="30" height="15" rx="3" fill="#4A90E2"/>
  <text x="140" y="75" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TWIN</text>

  <!-- Parallel deployment indicator -->
  <path d="M 85 48 L 85 55" stroke="#5BA3F5" stroke-width="2" stroke-linecap="round"/>
  <path d="M 195 48 L 195 55" stroke="#5BA3F5" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="52" x2="195" y2="52" stroke="#5BA3F5" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
