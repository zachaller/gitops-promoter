<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" width="320" height="300">
  <!-- Orbital Rocket - In Curved Trajectory -->

  <!-- Orbital path (curved) -->
  <path d="M 280 250 Q 220 200 160 170 Q 100 140 40 120"
        stroke="#4A90E2" stroke-width="2" fill="none" stroke-dasharray="8,4" opacity="0.4"/>

  <!-- Environment orbit markers -->
  <circle cx="260" cy="235" r="20" fill="#FF8C42" opacity="0.2"/>
  <text x="260" y="240" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF8C42" text-anchor="middle">DEV</text>

  <circle cx="160" cy="170" r="22" fill="#4A90E2" opacity="0.2"/>
  <text x="160" y="175" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4A90E2" text-anchor="middle">TEST</text>

  <circle cx="60" cy="120" r="24" fill="#00CC88" opacity="0.2"/>
  <text x="60" y="125" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00AA66" text-anchor="middle">PROD</text>

  <!-- Rocket body (tilted ~30 degrees for orbital insertion) -->
  <g transform="translate(180, 180) rotate(-35)">
    <!-- Exhaust (angled) -->
    <path d="M 35 95 Q 30 105 28 112" stroke="#FFA15C" stroke-width="6" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M 45 97 Q 45 106 45 114" stroke="#4A90E2" stroke-width="7" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 55 95 Q 60 105 62 112" stroke="#FFA15C" stroke-width="6" fill="none" opacity="0.7" stroke-linecap="round"/>

    <!-- Stage 1 (bottom) -->
    <rect x="25" y="55" width="50" height="40" rx="4" fill="#FF8C42"/>
    <rect x="28" y="58" width="44" height="34" rx="3" fill="#FFA15C" opacity="0.3"/>
    <text x="50" y="78" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>

    <!-- Stage 2 -->
    <rect x="28" y="20" width="44" height="35" rx="4" fill="#FF8C42"/>
    <rect x="31" y="23" width="38" height="29" rx="3" fill="#FFA15C" opacity="0.3"/>
    <text x="50" y="41" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>

    <!-- Stage 3 (top) -->
    <rect x="31" y="-10" width="38" height="30" rx="4" fill="#FF8C42"/>
    <rect x="34" y="-7" width="32" height="24" rx="3" fill="#FFA15C" opacity="0.3"/>
    <text x="50" y="9" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>

    <!-- Nose cone -->
    <path d="M 50 -35 L 63 -10 L 37 -10 Z" fill="#FF6B35"/>

    <!-- Window -->
    <circle cx="50" cy="-23" r="10" fill="#E8F4F8"/>
    <circle cx="48" cy="-24" r="2" fill="#2C3E50"/>
    <circle cx="52" cy="-24" r="2" fill="#2C3E50"/>
    <path d="M 47 -19 Q 50 -17 53 -19" stroke="#2C3E50" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Fins -->
    <path d="M 25 60 L 12 80 L 14 90 L 25 75 Z" fill="#4A90E2"/>
    <path d="M 75 60 L 88 80 L 86 90 L 75 75 Z" fill="#4A90E2"/>

    <!-- Engine nozzles -->
    <rect x="30" y="95" width="10" height="5" rx="1" fill="#5A5A5A"/>
    <rect x="60" y="95" width="10" height="5" rx="1" fill="#5A5A5A"/>

    <!-- RCS thrusters (for orbital maneuvering) -->
    <rect x="24" y="30" width="3" height="6" rx="1" fill="#5A5A5A"/>
    <rect x="73" y="30" width="3" height="6" rx="1" fill="#5A5A5A"/>

    <!-- Small RCS puffs -->
    <circle cx="25.5" cy="29" r="2" fill="#5BA3F5" opacity="0.5"/>
    <circle cx="74.5" cy="29" r="2" fill="#5BA3F5" opacity="0.5"/>
  </g>

  <!-- Velocity vector arrow -->
  <path d="M 185 145 L 130 115" stroke="#FFD700" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <path d="M 130 115 L 140 118 M 130 115 L 135 123" stroke="#FFD700" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <text x="150" y="125" font-family="Arial, sans-serif" font-size="10" fill="#FFD700">VELOCITY</text>

  <!-- Orbital status display -->
  <rect x="10" y="200" width="80" height="55" rx="5" fill="#2C3E50" opacity="0.8"/>
  <text x="50" y="217" font-family="monospace" font-size="10" fill="#00FF00" text-anchor="middle">ORBITAL</text>
  <text x="50" y="230" font-family="monospace" font-size="9" fill="#5BA3F5" text-anchor="middle">STATUS:</text>
  <text x="50" y="242" font-family="monospace" font-size="9" font-weight="bold" fill="#00FF00" text-anchor="middle">INSERTING</text>

  <!-- Altitude indicator -->
  <line x1="295" y1="50" x2="295" y2="250" stroke="#4A90E2" stroke-width="2" opacity="0.3"/>
  <text x="300" y="60" font-family="Arial, sans-serif" font-size="9" fill="#4A90E2">250km</text>
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="9" fill="#4A90E2">150km</text>
  <text x="300" y="240" font-family="Arial, sans-serif" font-size="9" fill="#4A90E2">50km</text>

  <!-- Position marker -->
  <circle cx="185" cy="180" r="5" fill="#FFD700" opacity="0.8">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Earth curve at bottom (representing planet) -->
  <path d="M 0 280 Q 160 260 320 280 L 320 300 L 0 300 Z" fill="#4A90E2" opacity="0.15"/>
  <path d="M 0 285 Q 160 265 320 285" stroke="#5BA3F5" stroke-width="2" opacity="0.2" fill="none"/>

  <!-- Stars in space -->
  <circle cx="30" cy="30" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="80" cy="50" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="120" cy="25" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="250" cy="40" r="2" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="290" cy="70" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="310" cy="30" r="1" fill="#FFFFFF" opacity="0.6"/>
</svg>
