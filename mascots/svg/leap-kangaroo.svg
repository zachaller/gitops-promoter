<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" width="320" height="300">
  <!-- Leap the Promotion Kangaroo -->

  <!-- Environment stages (platforms) -->
  <rect x="10" y="270" width="60" height="15" rx="3" fill="#FF8C42" opacity="0.5"/>
  <text x="40" y="282" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6B35" text-anchor="middle">DEV</text>

  <rect x="100" y="220" width="65" height="15" rx="3" fill="#4A90E2" opacity="0.5"/>
  <text x="132" y="232" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3B7BC4" text-anchor="middle">TEST</text>

  <rect x="200" y="165" width="70" height="15" rx="3" fill="#00CC88" opacity="0.5"/>
  <text x="235" y="177" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#00AA66" text-anchor="middle">PROD</text>

  <!-- Hop trajectory lines (showing previous hops) -->
  <path d="M 40 270 Q 70 240 132 220" stroke="#FF8C42" stroke-width="2" stroke-dasharray="4,4" opacity="0.3" fill="none"/>
  <path d="M 132 220 Q 170 185 235 165" stroke="#4A90E2" stroke-width="2" stroke-dasharray="4,4" opacity="0.3" fill="none"/>

  <!-- Kangaroo tail (behind) -->
  <path d="M 160 180 Q 140 210 130 240" stroke="#FF8C42" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 162 182 Q 144 208 135 235" stroke="#FFA15C" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Back leg (powerful, mid-leap) -->
  <ellipse cx="175" cy="190" rx="14" ry="35" fill="#FF8C42" transform="rotate(35 175 190)"/>
  <ellipse cx="173" cy="188" rx="11" ry="30" fill="#FFA15C" opacity="0.5" transform="rotate(35 173 188)"/>

  <!-- Back foot -->
  <ellipse cx="192" cy="210" rx="18" ry="10" fill="#FF8C42" transform="rotate(20 192 210)"/>
  <line x1="190" y1="215" x2="188" y2="220" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="194" y1="216" x2="193" y2="221" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="198" y1="215" x2="198" y2="220" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Kangaroo body (athletic, mid-leap) -->
  <ellipse cx="195" cy="145" rx="40" ry="50" fill="#FF8C42" transform="rotate(-20 195 145)"/>
  <ellipse cx="193" cy="143" rx="35" ry="45" fill="#FFA15C" opacity="0.4" transform="rotate(-20 193 143)"/>

  <!-- Belly (lighter) -->
  <ellipse cx="200" cy="150" rx="25" ry="35" fill="#FFD4A3" opacity="0.7" transform="rotate(-20 200 150)"/>

  <!-- Blue pouch (carrying git commits/PRs) -->
  <ellipse cx="205" cy="155" rx="20" ry="22" fill="#4A90E2" opacity="0.6" transform="rotate(-20 205 155)"/>
  <path d="M 195 150 Q 200 165 210 162" stroke="#3B7BC4" stroke-width="2" fill="none" transform="rotate(-20 200 155)"/>

  <!-- Git commits inside pouch -->
  <g transform="translate(200, 155) rotate(-20)">
    <circle cx="0" cy="0" r="3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="5" cy="-3" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="-4" cy="3" r="2.5" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Front leg (tucked during leap) -->
  <ellipse cx="220" cy="165" rx="12" ry="28" fill="#FF8C42" transform="rotate(-45 220 165)"/>

  <!-- Front paw -->
  <ellipse cx="230" cy="180" rx="10" ry="8" fill="#FF8C42"/>
  <line x1="227" y1="185" x2="225" y2="190" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="186" x2="230" y2="191" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
  <line x1="233" y1="185" x2="235" y2="190" stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>

  <!-- Kangaroo head -->
  <ellipse cx="215" cy="100" rx="28" ry="32" fill="#FF8C42" transform="rotate(-10 215 100)"/>
  <ellipse cx="213" cy="98" rx="25" ry="29" fill="#FFA15C" opacity="0.4" transform="rotate(-10 213 98)"/>

  <!-- Ears (large, alert) -->
  <ellipse cx="200" cy="72" rx="10" ry="25" fill="#FF8C42" transform="rotate(-25 200 72)"/>
  <ellipse cx="230" cy="70" rx="10" ry="25" fill="#FF8C42" transform="rotate(15 230 70)"/>
  <ellipse cx="200" cy="74" rx="6" ry="18" fill="#FFD4A3" opacity="0.7" transform="rotate(-25 200 74)"/>
  <ellipse cx="230" cy="72" rx="6" ry="18" fill="#FFD4A3" opacity="0.7" transform="rotate(15 230 72)"/>

  <!-- Snout area -->
  <ellipse cx="225" cy="110" rx="15" ry="12" fill="#FFD4A3"/>

  <!-- Nose -->
  <ellipse cx="232" cy="108" rx="5" ry="4" fill="#2C3E50"/>

  <!-- Whiskers -->
  <line x1="225" y1="112" x2="245" y2="110" stroke="#2C3E50" stroke-width="1" opacity="0.6"/>
  <line x1="225" y1="115" x2="245" y2="116" stroke="#2C3E50" stroke-width="1" opacity="0.6"/>

  <!-- Confident, enthusiastic eyes -->
  <ellipse cx="208" cy="95" rx="7" ry="9" fill="#FFFFFF"/>
  <ellipse cx="222" cy="93" rx="7" ry="9" fill="#FFFFFF"/>
  <circle cx="209" cy="96" r="4" fill="#2C3E50"/>
  <circle cx="223" cy="94" r="4" fill="#2C3E50"/>
  <circle cx="210" cy="94" r="1.5" fill="#FFFFFF"/>
  <circle cx="224" cy="92" r="1.5" fill="#FFFFFF"/>

  <!-- Energetic smile -->
  <path d="M 218 113 Q 225 118 232 115" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Motion lines (showing upward leap) -->
  <line x1="165" y1="195" x2="158" y2="210" stroke="#FFA15C" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <line x1="155" y1="205" x2="148" y2="220" stroke="#FF8C42" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  <line x1="145" y1="215" x2="138" y2="230" stroke="#FFA15C" stroke-width="3" opacity="0.3" stroke-linecap="round"/>

  <!-- Upward arrow (showing promotion direction) -->
  <path d="M 285 200 L 285 140 L 275 150 M 285 140 L 295 150" stroke="#00CC88" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <text x="285" y="230" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#00AA66" text-anchor="middle">UP!</text>

  <!-- Confidence indicator -->
  <g transform="translate(245, 120)">
    <circle cx="0" cy="0" r="12" fill="#FFD700" opacity="0.3"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="16" fill="#FFD700">★</text>
  </g>

  <!-- Previous hop markers -->
  <circle cx="40" cy="268" r="4" fill="#FF8C42" opacity="0.4"/>
  <circle cx="132" cy="218" r="4" fill="#4A90E2" opacity="0.4"/>
</svg>
