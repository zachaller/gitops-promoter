<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="260" height="320">
  <!-- Stellar Rocket - Futuristic Star-Powered Design -->

  <defs>
    <!-- Star energy gradient -->
    <radialGradient id="starPower" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:0.4" />
    </radialGradient>

    <!-- Plasma gradient -->
    <linearGradient id="plasmaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3F5;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Stellar exhaust (energy plasma) -->
  <path d="M 105 295 Q 100 305 98 313" stroke="url(#plasmaGradient)" stroke-width="10" fill="none" opacity="0.8" stroke-linecap="round">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M 130 298 Q 130 308 130 316" stroke="#FFD700" stroke-width="12" fill="none" opacity="0.9" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="0.8s" repeatCount="indefinite"/>
  </path>
  <path d="M 155 295 Q 160 305 162 313" stroke="url(#plasmaGradient)" stroke-width="10" fill="none" opacity="0.8" stroke-linecap="round">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="0.8s" repeatCount="indefinite"/>
  </path>

  <!-- Energy field around rocket -->
  <ellipse cx="130" cy="170" rx="70" ry="100" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.2">
    <animate attributeName="rx" values="70;75;70" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="100;105;100" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Rocket body (sleek futuristic) -->
  <!-- Bottom section DEV -->
  <rect x="90" y="225" width="80" height="70" rx="8" fill="#FF8C42"/>
  <rect x="95" y="230" width="70" height="60" rx="6" fill="#FFA15C" opacity="0.3"/>

  <!-- Energy channels -->
  <rect x="95" y="240" width="8" height="40" rx="2" fill="#FFD700" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="157" y="240" width="8" height="40" rx="2" fill="#FFD700" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="130" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>

  <!-- Middle section TEST -->
  <rect x="95" y="155" width="70" height="70" rx="8" fill="#FF8C42"/>
  <rect x="100" y="160" width="60" height="60" rx="6" fill="#FFA15C" opacity="0.3"/>

  <!-- Energy channels -->
  <rect x="100" y="170" width="8" height="40" rx="2" fill="#5BA3F5" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </rect>
  <rect x="152" y="170" width="8" height="40" rx="2" fill="#5BA3F5" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite" begin="0.3s"/>
  </rect>

  <text x="130" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>

  <!-- Top section PROD -->
  <rect x="100" y="95" width="60" height="60" rx="8" fill="#FF8C42"/>
  <rect x="105" y="100" width="50" height="50" rx="6" fill="#FFA15C" opacity="0.3"/>

  <!-- Energy channels -->
  <rect x="105" y="110" width="8" height="30" rx="2" fill="#00FF88" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite" begin="0.6s"/>
  </rect>
  <rect x="147" y="110" width="8" height="30" rx="2" fill="#00FF88" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1s" repeatCount="indefinite" begin="0.6s"/>
  </rect>

  <text x="130" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>

  <!-- Star-powered core (visible through transparent sections) -->
  <circle cx="130" cy="190" r="12" fill="url(#starPower)" opacity="0.7">
    <animate attributeName="r" values="10;14;10" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.7;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Futuristic nose cone -->
  <path d="M 130 25 L 160 95 L 100 95 Z" fill="#FF6B35"/>
  <path d="M 130 25 L 150 85 L 110 85 Z" fill="#FFD700" opacity="0.3"/>

  <!-- Star emblem on nose -->
  <path d="M 130 50 L 133 58 L 142 58 L 135 63 L 138 71 L 130 66 L 122 71 L 125 63 L 118 58 L 127 58 Z"
        fill="#FFD700" opacity="0.9">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Advanced cockpit -->
  <ellipse cx="130" cy="70" rx="16" ry="18" fill="#E8F4F8" opacity="0.9"/>
  <ellipse cx="130" cy="70" rx="14" ry="16" fill="#5BA3F5" opacity="0.2"/>

  <!-- Futuristic face (eyes with glow) -->
  <circle cx="125" cy="68" r="3" fill="#4A90E2"/>
  <circle cx="135" cy="68" r="3" fill="#4A90E2"/>
  <circle cx="126" cy="66" r="1.5" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="136" cy="66" r="1.5" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path d="M 123 75 Q 130 79 137 75" stroke="#4A90E2" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Energy wings (instead of fins) -->
  <path d="M 90 200 Q 60 210 50 230 Q 48 235 52 238 Q 58 235 60 230 Q 70 215 90 210 Z"
        fill="#5BA3F5" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 170 200 Q 200 210 210 230 Q 212 235 208 238 Q 202 235 200 230 Q 190 215 170 210 Z"
        fill="#5BA3F5" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- Plasma thrusters -->
  <ellipse cx="115" cy="295" rx="10" ry="6" fill="#7B68EE" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="145" cy="295" rx="10" ry="6" fill="#7B68EE" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Star field particles -->
  <circle cx="50" cy="80" r="2" fill="#FFD700" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="210" cy="100" r="2.5" fill="#FFD700" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="150" r="2" fill="#5BA3F5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="190" cy="180" r="2" fill="#5BA3F5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Power level indicator -->
  <rect x="180" y="165" width="60" height="50" rx="5" fill="#2C3E50" opacity="0.8"/>
  <text x="210" y="180" font-family="monospace" font-size="9" fill="#FFD700" text-anchor="middle">STELLAR</text>
  <text x="210" y="192" font-family="monospace" font-size="9" fill="#5BA3F5" text-anchor="middle">POWER</text>
  <rect x="185" y="197" width="50" height="8" rx="2" fill="#4A90E2" opacity="0.3"/>
  <rect x="185" y="197" width="45" height="8" rx="2" fill="#FFD700" opacity="0.8">
    <animate attributeName="width" values="40;50;40" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- "STELLAR" branding -->
  <text x="130" y="283" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFD700" text-anchor="middle" opacity="0.9">STELLAR</text>
</svg>
