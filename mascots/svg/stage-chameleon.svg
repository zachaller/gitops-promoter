<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <!-- Stage the Environment Chameleon -->

  <!-- Color gradient showing environment transition -->
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC88;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Environment labels/zones -->
  <g transform="translate(40, 30)">
    <rect x="-25" y="-12" width="50" height="24" rx="5" fill="#FF8C42" opacity="0.3"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF6B35" text-anchor="middle">DEV</text>
  </g>

  <g transform="translate(150, 30)">
    <rect x="-25" y="-12" width="50" height="24" rx="5" fill="#4A90E2" opacity="0.3"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4A90E2" text-anchor="middle">TEST</text>
  </g>

  <g transform="translate(260, 30)">
    <rect x="-25" y="-12" width="50" height="24" rx="5" fill="#00CC88" opacity="0.3"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00AA66" text-anchor="middle">PROD</text>
  </g>

  <!-- Git branch that chameleon sits on -->
  <line x1="30" y1="150" x2="270" y2="150" stroke="#8B6F47" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch nodes -->
  <circle cx="50" cy="150" r="6" fill="#FF8C42"/>
  <circle cx="150" cy="150" r="6" fill="#4A90E2"/>
  <circle cx="250" cy="150" r="6" fill="#00CC88"/>

  <!-- Leaves on branch -->
  <ellipse cx="80" cy="145" rx="8" ry="12" fill="#4A90E2" opacity="0.5" transform="rotate(-30 80 145)"/>
  <ellipse cx="180" cy="145" rx="8" ry="12" fill="#00CC88" opacity="0.5" transform="rotate(20 180 145)"/>
  <ellipse cx="220" cy="145" rx="8" ry="12" fill="#00CC88" opacity="0.5" transform="rotate(-20 220 145)"/>

  <!-- Chameleon tail (curled, gradient colored) -->
  <path d="M 100 165 Q 85 180 75 190 Q 70 200 75 205 Q 80 210 85 205 Q 90 200 88 190 Q 86 180 90 175"
        stroke="url(#bodyGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Chameleon back legs -->
  <ellipse cx="125" cy="155" rx="10" ry="18" fill="url(#bodyGradient)" transform="rotate(30 125 155)"/>
  <ellipse cx="145" cy="155" rx="10" ry="18" fill="url(#bodyGradient)" transform="rotate(-30 145 155)"/>

  <!-- Foot details -->
  <path d="M 120 165 L 118 172 M 122 166 L 122 173 M 125 166 L 127 173"
        stroke="#FF6B35" stroke-width="2" stroke-linecap="round"/>
  <path d="M 150 165 L 152 172 M 148 166 L 148 173 M 145 166 L 143 173"
        stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>

  <!-- Chameleon body -->
  <ellipse cx="150" cy="135" rx="50" ry="28" fill="url(#bodyGradient)"/>
  <ellipse cx="150" cy="133" rx="45" ry="25" fill="#FFFFFF" opacity="0.2"/>

  <!-- Spine bumps -->
  <ellipse cx="120" cy="125" rx="4" ry="6" fill="#FF6B35" opacity="0.6"/>
  <ellipse cx="135" cy="122" rx="4" ry="7" fill="#FFA15C" opacity="0.6"/>
  <ellipse cx="150" cy="120" rx="4" ry="8" fill="#5BA3F5" opacity="0.6"/>
  <ellipse cx="165" cy="122" rx="4" ry="7" fill="#5BA3F5" opacity="0.6"/>
  <ellipse cx="180" cy="125" rx="4" ry="6" fill="#00CC88" opacity="0.6"/>

  <!-- Chameleon front legs -->
  <ellipse cx="175" cy="145" rx="10" ry="16" fill="url(#bodyGradient)" transform="rotate(20 175 145)"/>
  <ellipse cx="195" cy="145" rx="10" ry="16" fill="url(#bodyGradient)" transform="rotate(-20 195 145)"/>

  <!-- Front foot details -->
  <path d="M 172 156 L 170 162 M 175 157 L 175 164 M 178 157 L 180 164"
        stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>
  <path d="M 198 156 L 200 162 M 195 157 L 195 164 M 192 157 L 190 164"
        stroke="#00AA66" stroke-width="2" stroke-linecap="round"/>

  <!-- Chameleon head -->
  <ellipse cx="210" cy="130" rx="30" ry="25" fill="url(#bodyGradient)"/>

  <!-- Head crest -->
  <path d="M 195 115 Q 200 105 205 110 Q 210 105 215 110 Q 220 105 225 115"
        stroke="#00CC88" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes (looking in different directions - monitoring) -->
  <g transform="translate(200, 125)">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#FFE0C2" transform="rotate(-20)"/>
    <circle cx="-2" cy="2" r="5" fill="#2C3E50"/>
    <circle cx="-1" cy="1" r="2" fill="#FFFFFF"/>
  </g>

  <g transform="translate(225, 130)">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="#FFE0C2" transform="rotate(30)"/>
    <circle cx="3" cy="-2" r="5" fill="#2C3E50"/>
    <circle cx="4" cy="-3" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Mouth -->
  <path d="M 228 138 Q 232 141 235 139" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nostrils -->
  <circle cx="233" cy="133" r="1.5" fill="#2C3E50"/>
  <circle cx="237" cy="133" r="1.5" fill="#2C3E50"/>

  <!-- Color change particles/effect -->
  <circle cx="110" cy="125" r="3" fill="#FF8C42" opacity="0.4"/>
  <circle cx="105" cy="135" r="2.5" fill="#FFA15C" opacity="0.3"/>
  <circle cx="150" cy="110" r="3" fill="#5BA3F5" opacity="0.4"/>
  <circle cx="155" cy="115" r="2" fill="#4A90E2" opacity="0.3"/>
  <circle cx="190" cy="115" r="3" fill="#00CC88" opacity="0.4"/>
  <circle cx="195" cy="120" r="2.5" fill="#00DD99" opacity="0.3"/>

  <!-- Adaptation arrows -->
  <path d="M 75 135 L 95 135 L 90 130 M 95 135 L 90 140" stroke="#FF8C42" stroke-width="2" opacity="0.5"/>
  <path d="M 205 135 L 225 135 L 220 130 M 225 135 L 220 140" stroke="#00CC88" stroke-width="2" opacity="0.5"/>
</svg>
