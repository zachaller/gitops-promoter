<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 310" width="200" height="310">
  <!-- Scout Rocket - Sleek Fast Exploration Design -->

  <!-- Streamlined exhaust trail (thin, precise) -->
  <path d="M 95 285 Q 93 293 92 300" stroke="#5BA3F5" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 100 288 Q 100 295 100 303" stroke="#4A90E2" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 105 285 Q 107 293 108 300" stroke="#5BA3F5" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Sleek body (narrow, aerodynamic) -->
  <ellipse cx="100" cy="200" rx="30" ry="85" fill="#FF8C42"/>
  <ellipse cx="98" cy="195" rx="26" ry="80" fill="#FFA15C" opacity="0.4"/>

  <!-- Aerodynamic stripes -->
  <path d="M 78 140 Q 82 145 88 148" stroke="#4A90E2" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 75 160 Q 80 165 87 168" stroke="#4A90E2" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 74 180 Q 79 185 86 188" stroke="#4A90E2" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <path d="M 122 140 Q 118 145 112 148" stroke="#4A90E2" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 125 160 Q 120 165 113 168" stroke="#4A90E2" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M 126 180 Q 121 185 114 188" stroke="#4A90E2" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Environment markers (minimal, sleek) -->
  <text x="100" y="250" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>

  <!-- Sharp nose cone (very aerodynamic) -->
  <path d="M 100 25 L 118 115 L 82 115 Z" fill="#FF6B35"/>

  <!-- Sensor array on nose -->
  <circle cx="100" cy="60" r="6" fill="#4A90E2" opacity="0.7"/>
  <circle cx="100" cy="60" r="4" fill="#5BA3F5"/>
  <circle cx="100" cy="60" r="2" fill="#FFFFFF"/>

  <!-- Cockpit window (streamlined) -->
  <ellipse cx="100" cy="95" rx="12" ry="15" fill="#E8F4F8"/>

  <!-- Alert, focused face -->
  <circle cx="97" cy="92" r="2.5" fill="#2C3E50"/>
  <circle cx="103" cy="92" r="2.5" fill="#2C3E50"/>
  <circle cx="98" cy="90" r="1" fill="#FFFFFF"/>
  <circle cx="104" cy="90" r="1" fill="#FFFFFF"/>
  <path d="M 96 99 Q 100 102 104 99" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Compact fins (minimal drag) -->
  <path d="M 70 220 L 55 250 L 58 265 L 70 245 Z" fill="#4A90E2"/>
  <path d="M 130 220 L 145 250 L 142 265 L 130 245 Z" fill="#4A90E2"/>

  <!-- Fin edge highlights -->
  <line x1="62" y1="240" x2="67" y2="235" stroke="#5BA3F5" stroke-width="1.5"/>
  <line x1="138" y1="240" x2="133" y2="235" stroke="#5BA3F5" stroke-width="1.5"/>

  <!-- Precision thrusters (small, efficient) -->
  <rect x="92" y="285" width="7" height="6" rx="1" fill="#5A5A5A"/>
  <rect x="101" y="285" width="7" height="6" rx="1" fill="#5A5A5A"/>

  <!-- Thruster glow -->
  <circle cx="95.5" cy="288" r="2" fill="#4A90E2" opacity="0.7"/>
  <circle cx="104.5" cy="288" r="2" fill="#4A90E2" opacity="0.7"/>

  <!-- Speed indicators (motion lines) -->
  <line x1="45" y1="160" x2="60" y2="162" stroke="#FFA15C" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="42" y1="180" x2="57" y2="182" stroke="#FF8C42" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="155" y1="160" x2="140" y2="162" stroke="#FFA15C" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="158" y1="180" x2="143" y2="182" stroke="#FF8C42" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Scout badge/emblem -->
  <circle cx="100" cy="165" r="10" fill="#4A90E2" opacity="0.5"/>
  <path d="M 100 158 L 102 163 L 107 163 L 103 167 L 105 172 L 100 169 L 95 172 L 97 167 L 93 163 L 98 163 Z"
        fill="#FFFFFF" opacity="0.8"/>

  <!-- Antenna array (communication) -->
  <line x1="82" y1="120" x2="78" y2="115" stroke="#4A90E2" stroke-width="1.5"/>
  <circle cx="78" cy="115" r="2" fill="#4A90E2"/>
  <line x1="118" y1="120" x2="122" y2="115" stroke="#4A90E2" stroke-width="1.5"/>
  <circle cx="122" cy="115" r="2" fill="#4A90E2"/>

  <!-- Exploration scanner lines -->
  <path d="M 90 80 Q 85 75 82 72" stroke="#5BA3F5" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <path d="M 110 80 Q 115 75 118 72" stroke="#5BA3F5" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Status indicator -->
  <rect x="73" y="135" width="3" height="12" rx="1" fill="#00FF00" opacity="0.7"/>
  <rect x="124" y="135" width="3" height="12" rx="1" fill="#00FF00" opacity="0.7"/>

  <!-- "SCOUT" label -->
  <text x="100" y="275" font-family="Arial, sans-serif" font-size="8" fill="#4A90E2" text-anchor="middle" opacity="0.7">SCOUT-01</text>
</svg>
