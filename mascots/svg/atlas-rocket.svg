<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 330" width="280" height="330">
  <!-- Atlas Rocket - Heavy-Duty Workhorse -->

  <!-- Massive exhaust plumes -->
  <path d="M 80 305 Q 70 315 65 323" stroke="#FF6B35" stroke-width="12" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 100 308 Q 98 318 97 326" stroke="#FFA15C" stroke-width="13" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 125 310 Q 125 320 125 328" stroke="#FFD700" stroke-width="14" fill="none" opacity="0.9" stroke-linecap="round"/>
  <path d="M 150 308 Q 152 318 153 326" stroke="#FFA15C" stroke-width="13" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M 170 305 Q 180 315 185 323" stroke="#FF6B35" stroke-width="12" fill="none" opacity="0.7" stroke-linecap="round"/>

  <!-- Additional side boosters exhaust -->
  <path d="M 45 298 Q 40 308 38 315" stroke="#4A90E2" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M 205 298 Q 210 308 212 315" stroke="#4A90E2" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- Side booster rockets -->
  <rect x="30" y="220" width="30" height="80" rx="5" fill="#FF8C42"/>
  <rect x="33" y="223" width="24" height="74" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="45" y="265" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle" transform="rotate(-90 45 265)">BOOSTER</text>

  <rect x="190" y="220" width="30" height="80" rx="5" fill="#FF8C42"/>
  <rect x="193" y="223" width="24" height="74" rx="3" fill="#FFA15C" opacity="0.3"/>
  <text x="205" y="265" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle" transform="rotate(90 205 265)">BOOSTER</text>

  <!-- Booster straps/attachments -->
  <rect x="60" y="235" width="15" height="5" fill="#5A5A5A"/>
  <rect x="60" y="270" width="15" height="5" fill="#5A5A5A"/>
  <rect x="175" y="235" width="15" height="5" fill="#5A5A5A"/>
  <rect x="175" y="270" width="15" height="5" fill="#5A5A5A"/>

  <!-- Main body (wide, sturdy) -->
  <!-- Stage 1 (bottom) DEV -->
  <rect x="75" y="230" width="100" height="75" rx="6" fill="#FF8C42"/>
  <rect x="80" y="235" width="90" height="65" rx="4" fill="#FFA15C" opacity="0.3"/>
  <text x="125" y="273" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">DEV</text>

  <!-- Structural bands -->
  <rect x="75" y="255" width="100" height="4" fill="#FF6B35"/>
  <rect x="75" y="280" width="100" height="4" fill="#FF6B35"/>

  <!-- Stage 2 (middle) TEST -->
  <rect x="80" y="155" width="90" height="75" rx="6" fill="#FF8C42"/>
  <rect x="85" y="160" width="80" height="65" rx="4" fill="#FFA15C" opacity="0.3"/>
  <text x="125" y="199" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">TEST</text>

  <!-- Structural bands -->
  <rect x="80" y="177" width="90" height="4" fill="#FF6B35"/>
  <rect x="80" y="207" width="90" height="4" fill="#FF6B35"/>

  <!-- Stage 3 (top) PROD -->
  <rect x="85" y="90" width="80" height="65" rx="6" fill="#FF8C42"/>
  <rect x="90" y="95" width="70" height="55" rx="4" fill="#FFA15C" opacity="0.3"/>
  <text x="125" y="129" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PROD</text>

  <!-- Structural band -->
  <rect x="85" y="115" width="80" height="4" fill="#FF6B35"/>

  <!-- Payload fairing (top) -->
  <path d="M 125 30 L 165 90 L 85 90 Z" fill="#FF6B35"/>

  <!-- Fairing separation line -->
  <line x1="105" y1="60" x2="105" y2="90" stroke="#FF8C42" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="145" y1="60" x2="145" y2="90" stroke="#FF8C42" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Command module window -->
  <circle cx="125" cy="65" r="18" fill="#E8F4F8"/>

  <!-- Determined, reliable face -->
  <circle cx="120" cy="63" r="3.5" fill="#2C3E50"/>
  <circle cx="130" cy="63" r="3.5" fill="#2C3E50"/>
  <circle cx="121" cy="61" r="1.5" fill="#FFFFFF"/>
  <circle cx="131" cy="61" r="1.5" fill="#FFFFFF"/>
  <path d="M 118 71 Q 125 75 132 71" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Heavy-duty fins -->
  <path d="M 75 245 L 40 280 L 42 300 L 75 275 Z" fill="#4A90E2"/>
  <path d="M 175 245 L 210 280 L 208 300 L 175 275 Z" fill="#4A90E2"/>

  <!-- Fin reinforcement -->
  <line x1="57" y1="263" x2="75" y2="255" stroke="#5BA3F5" stroke-width="3"/>
  <line x1="52" y1="283" x2="75" y2="270" stroke="#5BA3F5" stroke-width="3"/>
  <line x1="193" y1="263" x2="175" y2="255" stroke="#5BA3F5" stroke-width="3"/>
  <line x1="198" y1="283" x2="175" y2="270" stroke="#5BA3F5" stroke-width="3"/>

  <!-- Main engine cluster (5 engines) -->
  <rect x="85" y="305" width="15" height="10" rx="2" fill="#5A5A5A"/>
  <rect x="107" y="305" width="15" height="10" rx="2" fill="#5A5A5A"/>
  <rect x="128" y="305" width="15" height="10" rx="2" fill="#5A5A5A"/>
  <rect x="150" y="305" width="15" height="10" rx="2" fill="#5A5A5A"/>

  <!-- Center engine -->
  <circle cx="125" cy="313" r="8" fill="#5A5A5A"/>

  <!-- Engine glow -->
  <circle cx="92.5" cy="310" r="4" fill="#FFD700" opacity="0.7"/>
  <circle cx="114.5" cy="310" r="4" fill="#FFD700" opacity="0.7"/>
  <circle cx="125" cy="313" r="5" fill="#FFA15C" opacity="0.8"/>
  <circle cx="135.5" cy="310" r="4" fill="#FFD700" opacity="0.7"/>
  <circle cx="157.5" cy="310" r="4" fill="#FFD700" opacity="0.7"/>

  <!-- Booster engines -->
  <rect x="38" y="300" width="12" height="8" rx="2" fill="#5A5A5A"/>
  <circle cx="44" cy="304" r="3" fill="#4A90E2" opacity="0.7"/>

  <rect x="200" y="300" width="12" height="8" rx="2" fill="#5A5A5A"/>
  <circle cx="206" cy="304" r="3" fill="#4A90E2" opacity="0.7"/>

  <!-- Heavy payload indicator -->
  <rect x="10" y="150" width="55" height="50" rx="5" fill="#2C3E50" opacity="0.7"/>
  <text x="37" y="167" font-family="monospace" font-size="9" fill="#FFD700" text-anchor="middle">CAPACITY</text>
  <text x="37" y="183" font-family="monospace" font-size="14" font-weight="bold" fill="#00FF00" text-anchor="middle">HEAVY</text>
  <text x="37" y="195" font-family="monospace" font-size="8" fill="#5BA3F5" text-anchor="middle">50 TONS</text>

  <!-- "ATLAS" branding -->
  <text x="125" y="108" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4A90E2" text-anchor="middle" opacity="0.7">ATLAS</text>

  <!-- Rivets (heavy industrial look) -->
  <circle cx="80" cy="165" r="3" fill="#FF6B35"/>
  <circle cx="80" cy="220" r="3" fill="#FF6B35"/>
  <circle cx="170" cy="165" r="3" fill="#FF6B35"/>
  <circle cx="170" cy="220" r="3" fill="#FF6B35"/>
  <circle cx="90" cy="100" r="3" fill="#FF6B35"/>
  <circle cx="160" cy="100" r="3" fill="#FF6B35"/>
</svg>
