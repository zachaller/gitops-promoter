<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 280" width="300" height="280">
  <!-- Branchy the Multi-Armed Octopus -->

  <!-- 8 tentacles (representing git branches) -->
  <!-- Bottom left tentacle -->
  <path d="M 120 140 Q 60 160 40 200 Q 35 215 45 220 Q 55 215 50 200 Q 65 170 120 145"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="42" cy="207" r="4" fill="#4A90E2"/>
  <circle cx="48" cy="210" r="3" fill="#4A90E2"/>

  <!-- Left tentacle -->
  <path d="M 110 130 Q 50 130 30 160 Q 25 175 35 180 Q 45 175 40 160 Q 55 140 110 135"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="32" cy="167" r="4" fill="#4A90E2"/>
  <circle cx="38" cy="170" r="3" fill="#4A90E2"/>

  <!-- Top left tentacle -->
  <path d="M 115 110 Q 70 85 60 50 Q 58 35 68 30 Q 78 35 75 50 Q 82 75 120 105"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="62" cy="43" r="4" fill="#4A90E2"/>
  <circle cx="68" cy="40" r="3" fill="#4A90E2"/>

  <!-- Top tentacle -->
  <path d="M 140 95 Q 130 50 140 10 Q 145 0 150 0 Q 155 0 160 10 Q 170 50 160 95"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="145" cy="8" r="4" fill="#4A90E2"/>
  <circle cx="155" cy="8" r="4" fill="#4A90E2"/>

  <!-- Top right tentacle -->
  <path d="M 185 110 Q 230 85 240 50 Q 242 35 232 30 Q 222 35 225 50 Q 218 75 180 105"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="238" cy="43" r="4" fill="#4A90E2"/>
  <circle cx="232" cy="40" r="3" fill="#4A90E2"/>

  <!-- Right tentacle -->
  <path d="M 190 130 Q 250 130 270 160 Q 275 175 265 180 Q 255 175 260 160 Q 245 140 190 135"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="268" cy="167" r="4" fill="#4A90E2"/>
  <circle cx="262" cy="170" r="3" fill="#4A90E2"/>

  <!-- Bottom right tentacle -->
  <path d="M 180 140 Q 240 160 260 200 Q 265 215 255 220 Q 245 215 250 200 Q 235 170 180 145"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="258" cy="207" r="4" fill="#4A90E2"/>
  <circle cx="252" cy="210" r="3" fill="#4A90E2"/>

  <!-- Bottom tentacle -->
  <path d="M 150 160 Q 150 220 145 260 Q 143 270 150 275 Q 157 270 155 260 Q 160 220 160 160"
        fill="#FF8C42" stroke="#FF6B35" stroke-width="2"/>
  <circle cx="147" cy="267" r="4" fill="#4A90E2"/>
  <circle cx="153" cy="267" r="4" fill="#4A90E2"/>

  <!-- Main octopus head/body -->
  <ellipse cx="150" cy="120" rx="50" ry="55" fill="#FF8C42"/>
  <ellipse cx="150" cy="115" rx="45" ry="50" fill="#FFA15C" opacity="0.5"/>

  <!-- Friendly eyes -->
  <ellipse cx="135" cy="110" rx="12" ry="15" fill="#FFFFFF"/>
  <ellipse cx="165" cy="110" rx="12" ry="15" fill="#FFFFFF"/>
  <circle cx="135" cy="112" r="6" fill="#2C3E50"/>
  <circle cx="165" cy="112" r="6" fill="#2C3E50"/>
  <circle cx="137" cy="110" r="2.5" fill="#FFFFFF"/>
  <circle cx="167" cy="110" r="2.5" fill="#FFFFFF"/>

  <!-- Happy smile -->
  <path d="M 130 130 Q 150 140 170 130" stroke="#2C3E50" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Git branch symbols on tentacles -->
  <!-- Branch icons on some tentacles -->
  <g transform="translate(65, 165)">
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
    <line x1="0" y1="2" x2="-2" y2="6" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="2" x2="2" y2="6" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="-2" cy="6" r="1.5" fill="#FFFFFF"/>
    <circle cx="2" cy="6" r="1.5" fill="#FFFFFF"/>
  </g>

  <g transform="translate(235, 165)">
    <circle cx="0" cy="0" r="2" fill="#FFFFFF"/>
    <line x1="0" y1="2" x2="-2" y2="6" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="2" x2="2" y2="6" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="-2" cy="6" r="1.5" fill="#FFFFFF"/>
    <circle cx="2" cy="6" r="1.5" fill="#FFFFFF"/>
  </g>

  <!-- PR/Merge symbols on top tentacles -->
  <path d="M 145 25 L 155 25 L 150 30 Z" fill="#FFFFFF" opacity="0.9"/>
  <path d="M 145 18 L 155 18" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>

  <!-- Environment labels on body -->
  <text x="150" y="95" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF" text-anchor="middle">8 BRANCHES</text>
</svg>
