<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
  <!-- Merge the Friendly Bot -->

  <!-- Antenna with webhook signal -->
  <line x1="120" y1="30" x2="120" y2="55" stroke="#4A90E2" stroke-width="3"/>
  <circle cx="120" cy="25" r="6" fill="#4A90E2"/>

  <!-- Webhook signal waves -->
  <path d="M 110 22 Q 105 20 100 22" stroke="#5BA3F5" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 108 18 Q 100 15 92 18" stroke="#5BA3F5" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 130 22 Q 135 20 140 22" stroke="#5BA3F5" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 132 18 Q 140 15 148 18" stroke="#5BA3F5" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Robot head -->
  <rect x="85" y="55" width="70" height="60" rx="10" fill="#FF8C42"/>
  <rect x="90" y="60" width="60" height="50" rx="8" fill="#FFA15C" opacity="0.4"/>

  <!-- Display screen showing PR merge status -->
  <rect x="95" y="70" width="50" height="30" rx="3" fill="#E8F4F8"/>
  <text x="120" y="83" font-family="monospace" font-size="8" fill="#4A90E2" text-anchor="middle">PR #123</text>
  <text x="120" y="93" font-family="monospace" font-size="7" fill="#00CC00" text-anchor="middle">MERGED ✓</text>

  <!-- Eyes (friendly LED lights) -->
  <circle cx="103" cy="75" r="5" fill="#4A90E2" opacity="0.8"/>
  <circle cx="137" cy="75" r="5" fill="#4A90E2" opacity="0.8"/>
  <circle cx="104" cy="74" r="2" fill="#FFFFFF"/>
  <circle cx="138" cy="74" r="2" fill="#FFFFFF"/>

  <!-- Happy smile (LED strip) -->
  <path d="M 100 95 Q 120 102 140 95" stroke="#4A90E2" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Blue accent lights on head -->
  <circle cx="92" cy="65" r="3" fill="#4A90E2" opacity="0.7"/>
  <circle cx="148" cy="65" r="3" fill="#4A90E2" opacity="0.7"/>

  <!-- Robot body -->
  <rect x="75" y="115" width="90" height="80" rx="8" fill="#FF8C42"/>
  <rect x="80" y="120" width="80" height="70" rx="6" fill="#FFA15C" opacity="0.3"/>

  <!-- Heart-shaped health indicator (center of chest) -->
  <path d="M 120 140 L 115 145 Q 112 148 112 152 Q 112 156 115 159 L 120 164 L 125 159 Q 128 156 128 152 Q 128 148 125 145 Z"
        fill="#FF6B6B" opacity="0.8"/>
  <path d="M 120 140 L 115 145 Q 112 148 112 152 Q 112 156 115 159 L 120 164 L 125 159 Q 128 156 128 152 Q 128 148 125 145 Z"
        fill="#FFFFFF" opacity="0.3"/>

  <!-- Control panel buttons -->
  <circle cx="95" cy="145" r="4" fill="#4A90E2"/>
  <circle cx="95" cy="158" r="4" fill="#4A90E2"/>
  <circle cx="145" cy="145" r="4" fill="#00CC00" opacity="0.7"/>
  <circle cx="145" cy="158" r="4" fill="#00CC00" opacity="0.7"/>

  <!-- Status indicators -->
  <rect x="85" y="175" width="20" height="4" rx="2" fill="#00FF00" opacity="0.6"/>
  <rect x="85" y="182" width="15" height="4" rx="2" fill="#00FF00" opacity="0.6"/>
  <rect x="135" y="175" width="20" height="4" rx="2" fill="#00FF00" opacity="0.6"/>
  <rect x="135" y="182" width="15" height="4" rx="2" fill="#00FF00" opacity="0.6"/>

  <!-- Arms (extending, performing git operations) -->
  <!-- Left arm -->
  <rect x="55" y="130" width="20" height="50" rx="5" fill="#FF8C42"/>
  <circle cx="65" cy="130" r="8" fill="#FFA15C"/>

  <!-- Left hand/gripper -->
  <ellipse cx="65" cy="185" rx="12" ry="10" fill="#4A90E2"/>
  <rect x="60" y="185" width="4" height="12" rx="2" fill="#4A90E2"/>
  <rect x="66" y="185" width="4" height="12" rx="2" fill="#4A90E2"/>

  <!-- Git symbol in left hand -->
  <circle cx="65" cy="190" r="2.5" fill="#FFFFFF"/>
  <line x1="65" y1="192.5" x2="63" y2="196" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="65" y1="192.5" x2="67" y2="196" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="63" cy="196" r="1.5" fill="#FFFFFF"/>
  <circle cx="67" cy="196" r="1.5" fill="#FFFFFF"/>

  <!-- Right arm -->
  <rect x="165" y="130" width="20" height="50" rx="5" fill="#FF8C42"/>
  <circle cx="175" cy="130" r="8" fill="#FFA15C"/>

  <!-- Right hand/gripper -->
  <ellipse cx="175" cy="185" rx="12" ry="10" fill="#4A90E2"/>
  <rect x="170" y="185" width="4" height="12" rx="2" fill="#4A90E2"/>
  <rect x="176" y="185" width="4" height="12" rx="2" fill="#4A90E2"/>

  <!-- Merge arrows in right hand -->
  <path d="M 170 188 L 175 193 L 180 188" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <line x1="175" y1="193" x2="175" y2="196" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Legs/Base -->
  <rect x="90" y="195" width="25" height="55" rx="5" fill="#FF8C42"/>
  <rect x="125" y="195" width="25" height="55" rx="5" fill="#FF8C42"/>

  <!-- Treads/Wheels -->
  <rect x="85" y="250" width="30" height="15" rx="7" fill="#4A90E2"/>
  <rect x="125" y="250" width="30" height="15" rx="7" fill="#4A90E2"/>

  <!-- Wheel details -->
  <circle cx="92" cy="257" r="4" fill="#2C3E50" opacity="0.5"/>
  <circle cx="108" cy="257" r="4" fill="#2C3E50" opacity="0.5"/>
  <circle cx="132" cy="257" r="4" fill="#2C3E50" opacity="0.5"/>
  <circle cx="148" cy="257" r="4" fill="#2C3E50" opacity="0.5"/>

  <!-- PR merge action lines -->
  <path d="M 40 140 L 55 140" stroke="#5BA3F5" stroke-width="2" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M 185 140 L 200 140" stroke="#5BA3F5" stroke-width="2" stroke-dasharray="3,2" opacity="0.5"/>
  <path d="M 38 140 L 42 136 M 38 140 L 42 144" stroke="#5BA3F5" stroke-width="2" opacity="0.5"/>
  <path d="M 202 140 L 198 136 M 202 140 L 198 144" stroke="#5BA3F5" stroke-width="2" opacity="0.5"/>
</svg>
