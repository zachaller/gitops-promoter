apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.aggregated.promoter.argoproj.io
spec:
  # Set to true for development; in production, configure proper TLS
  insecureSkipTLSVerify: true
  group: aggregated.promoter.argoproj.io
  groupPriorityMinimum: 1000
  versionPriority: 15
  service:
    name: promoter-aggregated-apiserver
    namespace: promoter-system
  version: v1alpha1

