# RBAC for users to access the aggregated API resources
# This grants read access to promotionstatuses for all authenticated users
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promoter-aggregated-api-reader
rules:
- apiGroups:
  - aggregated.promoter.argoproj.io
  resources:
  - promotionstatuses
  verbs:
  - get
  - list
  - watch
---
# Bind to all authenticated users for easy local development
# In production, you'd bind this to specific users/groups
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promoter-aggregated-api-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promoter-aggregated-api-reader
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: system:authenticated

